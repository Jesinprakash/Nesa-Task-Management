<!DOCTYPE html>
<html>
<head>
    <title>Update Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .message {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Task</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Title</label>
        <input type="text" value="{{ task.title }}" disabled>

        <label>Description</label>
        <textarea disabled>{{ task.description }}</textarea>

        <label>Status</label>
        <select name="status">
            <option value="Pending" {% if task.status == "Pending" %}selected{% endif %}>
                Pending
            </option>
            <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %}>
                In Progress
            </option>
            <option value="Completed" {% if task.status == "Completed" %}selected{% endif %}>
                Completed
            </option>
        </select>

        <label>Completion Report</label>
        <textarea name="completion_report">
{{ task.completion_report }}
        </textarea>

        <label>Worked Hours</label>
        <input type="number" step="0.1" name="worked_hours"
               value="{{ task.worked_hours }}">

        <button type="submit">Update Task</button>
    </form>
</div>

</body>
</html>
