<!DOCTYPE html>
<html>
<head>
    <title>Create User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .back-btn {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Create User</h2>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

            <form method="post" action="{% url 'update_user' user_obj.id %}">
    {% csrf_token %}
    <div>
        <label>Username:</label>
        <input type="text" name="username" value="{{ user_obj.username }}" required>
    </div>
    <div>
        <label>Email:</label>
        <input type="email" name="email" value="{{ user_obj.email }}" required>
    </div>
    <div>
        <label>Password:</label>
        <input type="password" name="password" placeholder="Leave blank to keep current password">
    </div>

    {% if admins %}
    <div>
        <label>Assign Admin:</label>
        <select name="assigned_admin" required>
            <option value="">Select Admin</option>
            {% for admin in admins %}
                <option value="{{ admin.id }}" {% if admin.id == user_obj.assigned_admin.id %}selected{% endif %}>
                    {{ admin.username }}
                </option>
            {% endfor %}
        </select>
    </div>
    {% endif %}

    <button type="submit">Update User</button>
    
</form>

    <a href="{% url 'adminpanel' %}" class="back-btn">← Back to Dashboard</a>

</div>

</body>
</html>
