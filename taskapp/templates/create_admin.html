<!DOCTYPE html>
<html>
<head>
    <title>Create User | Task Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px 35px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            animation: fadeIn 0.4s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #28a745;
            outline: none;
            box-shadow: 0 0 6px rgba(40,167,69,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-1px);
        }

        .error {
            margin-top: 15px;
            background: #ffe5e5;
            color: #cc0000;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            color: #28a745;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 450px) {
            .container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Create Admin / User</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="username" placeholder="Enter Username" required autocomplete="off">
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Enter Password" required autocomplete="new-password">
        </div>

        <div class="form-group">
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="ADMIN">Admin</option>
                <option value="USER">User</option>
            </select>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <a href="{% url 'adminpanel' %}" class="back-btn">← Back to Dashboard</a>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
